<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Tło -->
  <rect width="64" height="64" rx="12" fill="#E8590C"/>

  <!-- Kabina lawety -->
  <rect x="34" y="26" width="18" height="16" rx="2" fill="white"/>
  <!-- Szyba kabiny -->
  <rect x="36" y="28" width="10" height="8" rx="1" fill="#E8590C" opacity="0.3"/>

  <!-- Platforma lawety -->
  <rect x="10" y="36" width="42" height="5" rx="1" fill="white"/>

  <!-- Rampa/wysięgnik -->
  <line x1="10" y1="36" x2="18" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Koła lawety -->
  <circle cx="20" cy="43" r="5" fill="#1A1A1A" stroke="white" stroke-width="1.5"/>
  <circle cx="20" cy="43" r="2" fill="white"/>
  <circle cx="44" cy="43" r="5" fill="#1A1A1A" stroke="white" stroke-width="1.5"/>
  <circle cx="44" cy="43" r="2" fill="white"/>

  <!-- Samochód na lawecie (zarys) -->
  <rect x="12" y="29" width="18" height="8" rx="2" fill="white" opacity="0.5"/>
  <rect x="15" y="27" width="11" height="5" rx="1" fill="white" opacity="0.4"/>
  <!-- Koła auta na lawecie -->
  <circle cx="16" cy="37" r="2.5" fill="#E8590C" stroke="white" stroke-width="1"/>
  <circle cx="26" cy="37" r="2.5" fill="#E8590C" stroke="white" stroke-width="1"/>
</svg>
